gigaam:
  model_name: v3_e2e_rnnt
  device: cpu
  pyannote_model: pyannote/speaker-diarization-community-1
  hf_token: null
  num_speakers: null
  min_speakers: 2
  max_speakers: 2
  vad_onset: 0.5
  vad_offset: 0.363
  chunk_size: 30.0
  fr_batch_size: 16
  fr_num_workers: 0
  merge_gap: 1.0

openai:
  api_key: null
  base_url: https://api.aitunnel.ru/v1/
  model: qwen3.6-max-preview
  temperature: 0.0
  max_tokens: 1000

prompts:
  default: >-
    Сейчас будет представлен диалог техподдержки компании Нетикс с клиентом.
    Твоя задача: восстановить смысл диалога, суммаризировать его в 3-4 предложениях,
    а также оценить эмоциональную окраску и указать, был ли клиент грубым или нет.
    Ответ должен быть строго в трех блоках без Markdown-разметки, списков, таблиц и дополнительных разделов:
    Название: одно предложение.
    Суммаризация: 3-4 предложения.
    Эмоциональная окраска: краткая оценка тона клиента.
    Не используй эмоджи. Пиши строго и формально. Не добавляй блоки, которых нет в указанном формате.
